import React, { useState, useEffect, useRef } from 'react';
import { 
  Camera, 
  Upload, 
  X, 
  Zap, 
  Share2, 
  Download, 
  Info, 
  AlertCircle, 
  CheckCircle2, 
  ArrowRight,
  RefreshCw,
  Search
} from 'lucide-react';

/**
 * 營養小精靈 V3.0 - 修復版
 * 修復說明：
 * 1. 移除 <style jsx global> 導致的 React 非布林屬性錯誤。
 * 2. 採用標準的 useEffect 注入樣式，確保相容性。
 */

const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'nutrition-elf-v3';
const DEFAULT_SYSTEM_PROMPT = `你是一位幽默但專業的營養師「營養小精靈」。任務：讀取食品營養標示與成分圖片（可能多張），綜合分析後轉換為白話文資訊。
請嚴格輸出純 JSON 格式（無 Markdown），結構如下：
{
  "productName": "產品名稱",
  "verdict": { "title": "一句話短評", "color": "red|green|yellow" },
  "highlights": [{ "type": "good|bad", "label": "指標(如熱量)", "value": "數值", "desc": "簡評" }],
  "translations": [{ "origin": "原文成分", "simplified": "譯名", "explain": "白話解釋" }],
  "advice": { "target": "適合誰", "warning": "不適合誰", "action": "怎麼吃" }
}`;

export default function App() {
  const [apiKey, setApiKey] = useState('');
  const [images, setImages] = useState([]);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [loadingText, setLoadingText] = useState('');
  const resultRef = useRef(null);

  const loadingTips = [
    "正在尋找隱藏的熱量地雷...",
    "小精靈正在翻閱營養百科...",
    "正在翻譯那些看不懂的化學名詞...",
    "分析中，這東西真的健康嗎？",
    "正在幫你計算這口要跑幾公里..."
  ];

  useEffect(() => {
    let interval;
    if (isAnalyzing) {
      setLoadingText(loadingTips[0]);
      interval = setInterval(() => {
        setLoadingText(loadingTips[Math.floor(Math.random() * loadingTips.length)]);
      }, 3000);
    }
    return () => clearInterval(interval);
  }, [isAnalyzing]);

  // 動態載入樣式與 html2canvas
  useEffect(() => {
    // 載入 html2canvas
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.async = true;
    document.body.appendChild(script);

    // 載入字體與全局樣式
    const styleLink = document.createElement('link');
    styleLink.rel = 'stylesheet';
    styleLink.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap';
    document.head.appendChild(styleLink);

    const styleTag = document.createElement('style');
    styleTag.textContent = `
      body {
        font-family: 'Noto Sans TC', sans-serif;
        overscroll-behavior-y: contain;
      }
      ::-webkit-scrollbar {
        width: 0;
        background: transparent;
      }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-result { animation: fade-in 0.5s ease-out forwards; }
    `;
    document.head.appendChild(styleTag);

    return () => {
      document.body.removeChild(script);
      document.head.removeChild(styleLink);
      document.head.removeChild(styleTag);
    };
  }, []);

  // --- 處理函式 ---
  const handleImageUpload = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onloadend = () => {
        setImages(prev => [...prev, reader.result]);
      };
      reader.readAsDataURL(file);
    });
  };

  const removeImage = (index) => {
    setImages(prev => prev.filter((_, i) => i !== index));
  };

  const analyzeNutrition = async () => {
    if (!apiKey) {
      setError("請先輸入 Gemini API Key");
      return;
    }
    if (images.length === 0) {
      setError("請至少上傳一張照片");
      return;
    }

    setIsAnalyzing(true);
    setError(null);

    try {
      const parts = [
        { text: DEFAULT_SYSTEM_PROMPT },
        ...images.map(img => ({
          inlineData: {
            mimeType: "image/png",
            data: img.split(',')[1]
          }
        }))
      ];

      const fetchWithRetry = async (retries = 5, delay = 1000) => {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts }] })
          });
          if (!response.ok) throw new Error('API Error');
          return await response.json();
        } catch (err) {
          if (retries > 0) {
            await new Promise(res => setTimeout(res, delay));
            return fetchWithRetry(retries - 1, delay * 2);
          }
          throw err;
        }
      };

      const data = await fetchWithRetry();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      
      if (!text) throw new Error("無效的 AI 回應");

      const jsonStr = text.replace(/```json|```/g, '').trim();
      setResult(JSON.parse(jsonStr));
    } catch (err) {
      console.error(err);
      setError("分析失敗。請確認 API Key 是否正確，或嘗試降低圖片大小後重試。");
    } finally {
      setIsAnalyzing(false);
    }
  };

  const shareResult = async () => {
    if (!resultRef.current || !window.html2canvas) {
      alert("載入分享功能中，請稍後重試...");
      return;
    }
    
    try {
      const canvas = await window.html2canvas(resultRef.current, {
        backgroundColor: '#FDFCF8',
        scale: 2,
        useCORS: true,
        logging: false
      });

      canvas.toBlob(async (blob) => {
        const file = new File([blob], 'nutrition-elf-report.png', { type: 'image/png' });

        if (navigator.share) {
          try {
            await navigator.share({
              files: [file],
              title: '營養小精靈報告',
              text: `看來這款「${result.productName}」的評價是：${result.verdict.title}！`
            });
          } catch (e) {
            const link = document.createElement('a');
            link.download = 'nutrition-report.png';
            link.href = canvas.toDataURL();
            link.click();
          }
        } else {
          const link = document.createElement('a');
          link.download = 'nutrition-report.png';
          link.href = canvas.toDataURL();
          link.click();
        }
      }, 'image/png');
    } catch (err) {
      console.error("Share failed", err);
    }
  };

  const StatusIcon = ({ color }) => {
    if (color === 'green') return <CheckCircle2 className="text-emerald-500 w-6 h-6" />;
    if (color === 'red') return <AlertCircle className="text-red-500 w-6 h-6" />;
    return <Info className="text-yellow-500 w-6 h-6" />;
  };

  return (
    <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center text-slate-800">
      <div className="w-full max-w-md min-h-screen bg-white shadow-xl flex flex-col relative overflow-hidden">
        
        {/* Header */}
        <header className="p-6 bg-gradient-to-br from-emerald-500 to-teal-600 text-white shadow-lg">
          <div className="flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className="p-2 bg-white/20 rounded-xl backdrop-blur-md">
                <Zap size={24} className="fill-white" />
              </div>
              <h1 className="text-xl font-bold tracking-tight">營養小精靈</h1>
            </div>
            <span className="text-xs bg-white/20 px-2 py-1 rounded-full backdrop-blur-md">V3.1 Fixed</span>
          </div>
          <p className="mt-4 text-emerald-50 opacity-90 text-sm leading-relaxed">
            我是你的口袋營養師。拍下成分表，讓我為你解讀那些神祕的添加物。
          </p>
        </header>

        {/* Main */}
        <main className="flex-1 p-6 space-y-6 overflow-y-auto">
          
          {!result && (
            <div className="space-y-4">
              <div className="relative">
                <input 
                  type="password"
                  placeholder="輸入你的 Gemini API Key..."
                  className="w-full px-4 py-3 rounded-2xl bg-slate-100 border-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm outline-none"
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                />
              </div>

              <div className="grid grid-cols-2 gap-3">
                {images.map((img, idx) => (
                  <div key={idx} className="relative aspect-square rounded-2xl overflow-hidden group border-2 border-slate-100 shadow-sm">
                    <img src={img} className="w-full h-full object-cover" alt="upload preview" />
                    <button 
                      onClick={() => removeImage(idx)}
                      className="absolute top-2 right-2 p-1.5 bg-red-500/80 text-white rounded-full backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity"
                    >
                      <X size={14} />
                    </button>
                  </div>
                ))}
                
                {images.length < 4 && (
                  <label className="aspect-square rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-emerald-400 hover:bg-emerald-50/50 transition-all text-slate-400 hover:text-emerald-500">
                    <Upload size={24} />
                    <span className="text-xs font-medium">新增照片</span>
                    <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} />
                  </label>
                )}
              </div>

              {error && (
                <div className="p-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs flex items-center gap-2">
                  <AlertCircle size={14} /> {error}
                </div>
              )}

              <button 
                disabled={isAnalyzing || images.length === 0}
                onClick={analyzeNutrition}
                className={`w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 ${
                  isAnalyzing || images.length === 0 
                  ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                  : 'bg-emerald-500 text-white hover:bg-emerald-600'
                }`}
              >
                {isAnalyzing ? (
                  <RefreshCw className="animate-spin" />
                ) : (
                  <>小精靈開始分析 <ArrowRight size={18} /></>
                )}
              </button>
            </div>
          )}

          {result && (
            <div className="animate-result">
              <div ref={resultRef} className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-2xl">
                <div className={`p-6 border-b-4 ${
                  result.verdict.color === 'green' ? 'border-emerald-500' : 
                  result.verdict.color === 'red' ? 'border-red-500' : 'border-yellow-500'
                }`}>
                  <div className="flex justify-between items-start mb-2">
                    <h2 className="text-2xl font-black text-slate-800 leading-tight">{result.productName}</h2>
                    <StatusIcon color={result.verdict.color} />
                  </div>
                  <div className={`inline-block px-3 py-1 rounded-full text-xs font-bold ${
                    result.verdict.color === 'green' ? 'bg-emerald-100 text-emerald-700' : 
                    result.verdict.color === 'red' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'
                  }`}>
                    {result.verdict.title}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4 p-6 bg-slate-50/50">
                  {result.highlights.map((h, i) => (
                    <div key={i} className="p-4 rounded-2xl bg-white shadow-sm border border-slate-100">
                      <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{h.label}</div>
                      <div className="text-lg font-black text-slate-800">{h.value}</div>
                      <div className={`text-[10px] font-medium ${h.type === 'good' ? 'text-emerald-500' : 'text-red-400'}`}>
                        {h.desc}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="p-6 space-y-4 text-sm">
                  <div className="flex items-center gap-2 text-slate-400 mb-2">
                    <Search size={14} />
                    <span className="text-xs font-bold uppercase tracking-wider">成分翻譯機</span>
                  </div>
                  <div className="space-y-3">
                    {result.translations.map((t, i) => (
                      <div key={i} className="group p-3 rounded-xl border border-slate-50 hover:border-emerald-100 hover:bg-emerald-50/30 transition-all">
                        <div className="flex justify-between items-center mb-1">
                          <span className="text-xs font-mono text-slate-400 line-through decoration-slate-300 italic">{t.origin}</span>
                          <span className="text-sm font-bold text-emerald-600">→ {t.simplified}</span>
                        </div>
                        <p className="text-xs text-slate-500 leading-relaxed italic">「{t.explain}」</p>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="p-6 bg-emerald-500 text-white rounded-b-3xl">
                  <div className="flex items-center gap-2 mb-4">
                    <Zap size={18} className="fill-white" />
                    <span className="text-sm font-bold">小精靈建議</span>
                  </div>
                  <div className="space-y-4 text-xs">
                    <div className="flex gap-3">
                      <span className="shrink-0 bg-white/20 px-2 py-0.5 rounded h-fit font-bold uppercase">適合</span>
                      <p className="opacity-90 leading-normal">{result.advice.target}</p>
                    </div>
                    <div className="flex gap-3">
                      <span className="shrink-0 bg-red-400 px-2 py-0.5 rounded h-fit font-bold text-white uppercase">注意</span>
                      <p className="opacity-90 leading-normal">{result.advice.warning}</p>
                    </div>
                    <div className="flex gap-3">
                      <span className="shrink-0 bg-white/20 px-2 py-0.5 rounded h-fit font-bold uppercase">建議</span>
                      <p className="opacity-90 leading-normal">{result.advice.action}</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="mt-6 flex gap-3 pb-8">
                <button 
                  onClick={() => {setResult(null); setImages([]);}}
                  className="flex-1 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 font-bold flex items-center justify-center gap-2 shadow-sm"
                >
                  <RefreshCw size={18} /> 重新分析
                </button>
                <button 
                  onClick={shareResult}
                  className="flex-1 py-4 rounded-2xl bg-slate-800 text-white font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform"
                >
                  <Share2 size={18} /> 分享小卡
                </button>
              </div>
            </div>
          )}
        </main>

        {!result && (
          <footer className="p-6 text-center">
            <p className="text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em]">
              Powered by Gemini 2.5 & Vibe Coding
            </p>
          </footer>
        )}

        {isAnalyzing && (
          <div className="absolute inset-0 z-50 bg-white/90 backdrop-blur-md flex flex-col items-center justify-center p-8 text-center">
            <div className="relative w-32 h-32 mb-8">
              <div className="absolute inset-0 border-4 border-emerald-100 rounded-full"></div>
              <div className="absolute inset-0 border-4 border-emerald-500 rounded-full border-t-transparent animate-spin"></div>
              <div className="absolute inset-4 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500 shadow-inner">
                <Zap size={40} className="fill-emerald-500 animate-pulse" />
              </div>
            </div>
            <h3 className="text-lg font-black text-slate-800 mb-2">正在分析成分</h3>
            <p className="text-sm text-slate-500 animate-pulse">{loadingText}</p>
          </div>
        )}
      </div>
    </div>
  );
}

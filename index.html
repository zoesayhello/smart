<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRITION ELF - 專業營養數據解析</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 簡單的 Lucide Icon 組件封裝
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = lucide.createIcons({
                        icons: { [name]: {} },
                        attrs: { strokeWidth: 2.5, width: size, height: size }
                    });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-block ${className}`} />;
        };

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [modelName] = useState('gemini-robotics-er-1.5-preview');
            const [images, setImages] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                try {
                    const savedKey = window.localStorage.getItem('nutrition_elf_api_key');
                    if (savedKey) setApiKey(savedKey);
                } catch (err) {
                    console.warn("無法存取 localStorage");
                }
            }, []);

            const handleApiKeyChange = (value) => {
                setApiKey(value);
                try {
                    window.localStorage.setItem('nutrition_elf_api_key', value);
                } catch (err) {}
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (reader.result) setImages(prev => [...prev, reader.result]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const analyzeNutrition = async () => {
                if (!apiKey.trim()) { setError("請先輸入 API Key"); return; }
                if (images.length === 0) { setError("請上傳食品標籤照片"); return; }

                setIsAnalyzing(true);
                setError(null);

                const systemPrompt = `你是一位專業營養師。請分析圖片中的食品標籤。
                請務必以純 JSON 格式回傳，不要包含 Markdown 標記。
                格式範例：{ 
                  "productName": "產品名稱", 
                  "verdict": { "title": "整體短評", "color": "green|yellow|red" }, 
                  "highlights": [{"label":"指標","value":"數值","desc":"評語"}], 
                  "advice": {"target":"適合人群","warning":"注意事項","action":"食用建議"} 
                }`;

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey.trim()}`;
                    const payload = {
                        contents: [{
                            parts: [
                                { text: systemPrompt },
                                ...images.map(img => ({ 
                                    inlineData: { mimeType: "image/png", data: img.split(',')[1] } 
                                }))
                            ]
                        }]
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "分析連線失敗");

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const cleanJson = rawText.replace(/```json|```/g, '').trim();
                    setResult(JSON.parse(cleanJson));
                } catch (err) {
                    setError(`系統錯誤：${err.message}`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-xl mx-auto">
                        <header className="text-center mb-12">
                            <div className="flex justify-center items-center gap-3 mb-3">
                                <Icon name="Zap" size={36} className="text-amber-500 fill-amber-500" />
                                <h1 className="text-4xl font-black tracking-tighter italic">NUTRITION ELF</h1>
                            </div>
                            <p className="text-neutral-400 text-xs font-bold tracking-[0.4em] uppercase">專業營養數據解析</p>
                        </header>

                        {!result ? (
                            <div className="bg-white rounded-[3rem] p-8 shadow-xl border border-neutral-100 space-y-8 animate-in">
                                <div className="space-y-4">
                                    <div className="group">
                                        <label className="text-[10px] font-black text-neutral-300 uppercase tracking-widest ml-2 group-focus-within:text-amber-500 transition-colors">
                                            API Access (自動記憶)
                                        </label>
                                        <input 
                                            type="password" 
                                            placeholder="輸入您的 API Key"
                                            className="w-full p-6 bg-neutral-50 rounded-[2rem] outline-none focus:ring-2 focus:ring-neutral-200 transition-all text-sm border border-neutral-100 mt-1"
                                            value={apiKey} 
                                            onChange={(e) => handleApiKeyChange(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {images.map((img, i) => (
                                        <div key={i} className="relative aspect-square animate-in">
                                            <img src={img} className="w-full h-full object-cover rounded-[2rem] border border-neutral-100 shadow-sm" />
                                            <button 
                                                onClick={() => setImages(prev => prev.filter((_, idx) => idx !== i))} 
                                                className="absolute -top-1 -right-1 bg-white shadow-xl rounded-full p-2.5 text-red-500 hover:scale-110 active:scale-90 transition-all"
                                            >
                                                <Icon name="X" size={16} />
                                            </button>
                                        </div>
                                    ))}
                                    {images.length < 4 && (
                                        <label className="aspect-square border-2 border-dashed border-neutral-200 rounded-[2rem] flex flex-col items-center justify-center cursor-pointer hover:bg-neutral-50 transition-all text-neutral-300 group">
                                            <Icon name="Upload" size={32} className="group-hover:text-amber-500 transition-colors mb-2" />
                                            <span className="text-[10px] font-black uppercase tracking-tighter">上傳食品照片</span>
                                            <input type="file" multiple className="hidden" onChange={handleImageUpload} />
                                        </label>
                                    )}
                                </div>

                                {error && (
                                    <div className="p-5 bg-red-50 text-red-600 rounded-3xl text-[11px] font-medium border border-red-100 flex gap-3">
                                        <Icon name="AlertCircle" size={16} className="shrink-0" />
                                        <span>{error}</span>
                                    </div>
                                )}

                                <button 
                                    onClick={analyzeNutrition} 
                                    disabled={isAnalyzing || images.length === 0}
                                    className="w-full py-7 bg-neutral-900 text-white rounded-[2.5rem] font-black tracking-widest shadow-2xl hover:bg-neutral-800 active:scale-95 disabled:opacity-20 transition-all text-lg"
                                >
                                    {isAnalyzing ? "正在解析數據..." : "產出營養報告"}
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in">
                                <div className="bg-white rounded-[3rem] p-8 shadow-xl border border-neutral-100 relative overflow-hidden">
                                    <div className={`absolute top-0 left-0 w-full h-3 ${result.verdict.color === 'green' ? 'bg-emerald-500' : result.verdict.color === 'red' ? 'bg-rose-500' : 'bg-amber-500'}`} />
                                    
                                    <div className="flex justify-between items-start mb-10">
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-neutral-300 uppercase tracking-[0.2em]">Product Name</p>
                                            <h2 className="text-3xl font-black text-neutral-900">{result.productName}</h2>
                                        </div>
                                        <div className={`px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest ${
                                            result.verdict.color === 'green' ? 'bg-emerald-50 text-emerald-600' : 
                                            result.verdict.color === 'red' ? 'bg-rose-50 text-rose-600' : 'bg-amber-50 text-amber-600'
                                        }`}>
                                            {result.verdict.title}
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                        {result.highlights.map((h, i) => (
                                            <div key={i} className="bg-neutral-50 p-6 rounded-[2rem] border border-neutral-100 hover:bg-white transition-all">
                                                <p className="text-[10px] font-black text-neutral-400 uppercase mb-2 tracking-tighter">{h.label}</p>
                                                <p className="font-black text-2xl text-neutral-900">{h.value}</p>
                                                <p className="text-[11px] text-neutral-500 leading-snug mt-2 font-medium">{h.desc}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="space-y-4 border-t border-neutral-100 pt-8">
                                        <div className="flex gap-4">
                                            <div className="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center shrink-0">
                                                <Icon name="CheckCircle2" size={20} className="text-emerald-500" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-neutral-300 uppercase tracking-widest">食用建議</p>
                                                <p className="text-sm font-bold text-neutral-700">{result.advice?.action}</p>
                                                <p className="text-[11px] text-neutral-400 mt-1">適合人群：{result.advice?.target}</p>
                                            </div>
                                        </div>
                                        {result.advice?.warning && (
                                            <div className="flex gap-4">
                                                <div className="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center shrink-0">
                                                    <Icon name="AlertCircle" size={20} className="text-rose-500" />
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-black text-neutral-300 uppercase tracking-widest">注意事項</p>
                                                    <p className="text-[11px] text-neutral-500 font-medium leading-relaxed">{result.advice.warning}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button 
                                    onClick={() => {setResult(null); setImages([]); setError(null);}}
                                    className="w-full py-6 bg-white border-2 border-neutral-900 text-neutral-900 rounded-[2.5rem] font-black tracking-widest hover:bg-neutral-50 active:scale-95 transition-all flex items-center justify-center gap-3"
                                >
                                    <Icon name="ArrowLeft" size={20} />
                                    重新分析其他食品
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

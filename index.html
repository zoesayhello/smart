<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>NUTRITION ELF - 專業營養數據解析</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background-color: #fcfbf7;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 自訂行動端平滑滾動 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 10px;
        }
        
        /* 擬真黑白 Nutrition Facts 標籤，縮放自適應 */
        .nutrition-label {
            border: 2px solid #000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            max-width: 100%;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.96); opacity: 0.6; }
            50% { transform: scale(1.08); opacity: 0.2; }
            100% { transform: scale(0.96); opacity: 0.6; }
        }
        .pulse-effect {
            animation: pulse-ring 2s infinite ease-in-out;
        }
        
        /* 解決 iOS 滾動回彈干擾 */
        .smooth-scroll {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="text-neutral-800 antialiased smooth-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 動態圖示組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const iconNode = document.createElement('i');
                    iconNode.setAttribute('data-lucide', name);
                    iconNode.style.width = `${size}px`;
                    iconNode.style.height = `${size}px`;
                    iconRef.current.appendChild(iconNode);
                    window.lucide.createIcons({
                        nodeList: [iconNode],
                        attrs: { strokeWidth: 2, width: size, height: size }
                    });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [modelName, setModelName] = useState('gemini-2.5-flash'); 
            const [images, setImages] = useState([]); 
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [loadingStep, setLoadingStep] = useState(0);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            // 針對手機端優化的分析步驟載入動畫
            const loadingSteps = [
                "正在建立安全精靈通道...",
                "正在精準掃描圖片文字...",
                "正在過濾人工添加物...",
                "正在精算巨量營養素比例...",
                "正在調取國際膳食健康標準...",
                "正在為您量身規劃食用建議..."
            ];

            // 載入本地記憶
            useEffect(() => {
                try {
                    const savedKey = window.localStorage.getItem('nutrition_elf_api_key');
                    if (savedKey) setApiKey(savedKey);
                    const savedModel = window.localStorage.getItem('nutrition_elf_model');
                    if (savedModel) setModelName(savedModel);
                } catch (err) {
                    console.warn("本機快取不可用");
                }
            }, []);

            // 載入階段動畫定時器
            useEffect(() => {
                let interval;
                if (isAnalyzing) {
                    interval = setInterval(() => {
                        setLoadingStep(prev => (prev + 1) % loadingSteps.length);
                    }, 2200);
                } else {
                    setLoadingStep(0);
                }
                return () => clearInterval(interval);
            }, [isAnalyzing]);

            const handleApiKeyChange = (value) => {
                setApiKey(value);
                try {
                    window.localStorage.setItem('nutrition_elf_api_key', value);
                } catch (err) {}
            };

            const handleModelChange = (value) => {
                setModelName(value);
                try {
                    window.localStorage.setItem('nutrition_elf_model', value);
                } catch (err) {}
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (reader.result) {
                            const matched = reader.result.match(/^data:(image\/[a-zA-Z+]+);base64,/);
                            const mimeType = matched ? matched[1] : 'image/jpeg';
                            
                            setImages(prev => [...prev, {
                                dataUrl: reader.result,
                                mimeType: mimeType
                            }]);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeImage = (indexToRemove) => {
                setImages(prev => prev.filter((_, idx) => idx !== indexToRemove));
            };

            const analyzeNutrition = async () => {
                if (!apiKey.trim()) { setError("請填寫您的 Gemini API Key 才能開啟分析精靈"); return; }
                if (images.length === 0) { setError("請先拍下或上傳食品標籤照片"); return; }

                setIsAnalyzing(true);
                setError(null);

                const systemPrompt = `你是一位擁有國家證照的資深專業營養師、食品科學專家。
                請精確分析圖片中呈現的食品成分表與營養標示貼紙。
                
                你必須嚴格遵守以下 JSON 格式回傳，不要有任何 Markdown 區塊包裹外的雜訊：
                {
                  "productName": "產品名稱(若辨識不出請根據圖片推測)",
                  "healthScore": 78,
                  "verdict": {
                    "title": "整體短評(例如：高纖低糖的理想點心、需注意高鈉陷阱)",
                    "color": "green"
                  },
                  "macros": {
                    "servingSize": "份量大小(例如: 每100克 或 每包25公克)",
                    "calories": "240大卡",
                    "carbs": "45公克",
                    "protein": "8.5公克",
                    "fat": "3.2公克",
                    "sodium": "120毫克"
                  },
                  "highlights": [
                    {
                      "label": "指標項目 (例如: 糖分 / 蛋白質 / 飽和脂肪)",
                      "value": "數值 (例如: 22g / 1.5g)",
                      "desc": "針對此指標的營養學點評與警示",
                      "type": "positive"
                    }
                  ],
                  "additives": [
                    {
                      "name": "添加物/防腐劑/色素名稱",
                      "safety": "safe",
                      "purpose": "添加目的簡述(如：增稠、人工甜味劑、防腐)"
                    }
                  ],
                  "allergens": ["麩質", "大豆"],
                  "advice": {
                    "target": "最適合食用此食品的族群類型",
                    "warning": "特定病患或體質需注意的食用禁忌",
                    "action": "日常生活中最平衡、具體且具可操作性的食用建議"
                  }
                }`;

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey.trim()}`;
                    
                    const payload = {
                        contents: [{
                            parts: [
                                { text: systemPrompt },
                                ...images.map(img => ({ 
                                    inlineData: { 
                                        mimeType: img.mimeType, 
                                        data: img.dataUrl.split(',')[1] 
                                    } 
                                }))
                            ]
                        }]
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error?.message || "Gemini 雲端連線異常，請確認 API 金鑰有效性");
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("API 未傳回有效分析報告");

                    const jsonRegex = /\{[\s\S]*\}/;
                    const matchedJson = rawText.match(jsonRegex);
                    if (!matchedJson) throw new Error("回傳報告排版格式不符，請再試一次。");
                    
                    const parsedData = JSON.parse(matchedJson[0]);
                    
                    const normalized = {
                        productName: parsedData.productName || "未知食品",
                        healthScore: typeof parsedData.healthScore === 'number' ? parsedData.healthScore : 70,
                        verdict: {
                            title: parsedData.verdict?.title || "解析完畢",
                            color: ["green", "yellow", "red"].includes(parsedData.verdict?.color) ? parsedData.verdict.color : "yellow"
                        },
                        macros: {
                            servingSize: parsedData.macros?.servingSize || "每 100 克",
                            calories: parsedData.macros?.calories || "未標示",
                            carbs: parsedData.macros?.carbs || "未標示",
                            protein: parsedData.macros?.protein || "未標示",
                            fat: parsedData.macros?.fat || "未標示",
                            sodium: parsedData.macros?.sodium || "未標示"
                        },
                        highlights: Array.isArray(parsedData.highlights) ? parsedData.highlights : [],
                        additives: Array.isArray(parsedData.additives) ? parsedData.additives : [],
                        allergens: Array.isArray(parsedData.allergens) ? parsedData.allergens : [],
                        advice: {
                            target: parsedData.advice?.target || "大眾皆宜",
                            warning: parsedData.advice?.warning || "目前無特殊體質禁忌",
                            action: parsedData.advice?.action || "適度食用，並搭配均衡健康飲食。"
                        }
                    };

                    setResult(normalized);
                } catch (err) {
                    console.error(err);
                    setError(`解析失敗：${err.message}`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen pb-12 pt-6 px-4 sm:px-6 lg:px-8 max-w-lg mx-auto md:max-w-4xl">
                    {}
                    <header className="flex flex-col items-center justify-center text-center mb-6 sm:mb-8">
                        <div className="inline-flex items-center gap-2 px-3.5 py-1 rounded-full bg-emerald-50 border border-emerald-100 text-emerald-700 text-[11px] font-bold tracking-wider mb-3 shadow-sm">
                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            行動全能 AI 營養師
                        </div>
                        <div className="flex items-center gap-2.5">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-emerald-600 to-emerald-400 flex items-center justify-center shadow-md shadow-emerald-100">
                                <Icon name="Sparkles" size={22} className="text-white" />
                            </div>
                            <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight text-neutral-900">
                                NUTRITION <span className="text

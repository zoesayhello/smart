<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRITION ELF - 專業營養數據解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Lucide Icon 組件封裝
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = lucide.createIcons({
                        icons: { [name]: {} },
                        attrs: { strokeWidth: 2.5, width: size, height: size }
                    });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-block ${className}`} />;
        };

        function App() {
            const [apiKey, setApiKey] = useState('');
            // 已更換為當前穩定的 gemini-1.5-flash
            const [modelName] = useState('gemini-1.5-flash');
            const [images, setImages] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                try {
                    const savedKey = window.localStorage.getItem('nutrition_elf_api_key');
                    if (savedKey) setApiKey(savedKey);
                } catch (err) {
                    console.warn("無法存取 localStorage");
                }
            }, []);

            const handleApiKeyChange = (value) => {
                setApiKey(value);
                try {
                    window.localStorage.setItem('nutrition_elf_api_key', value);
                } catch (err) {}
            };

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (reader.result) setImages(prev => [...prev, reader.result]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const analyzeNutrition = async () => {
                if (!apiKey.trim()) { setError("請先輸入 API Key"); return; }
                if (images.length === 0) { setError("請上傳食品標籤照片"); return; }

                setIsAnalyzing(true);
                setError(null);
                const systemPrompt = `你是一位專業營養師。請分析圖片中的食品標籤。
                請務必以純 JSON 格式回傳，欄位名稱必須完全精確。
                JSON 格式：
                { 
                  "productName": "產品名稱", 
                  "verdict": { "title": "整體短評", "color": "green|yellow|red" }, 
                  "highlights": [{"label":"指標名稱","value":"數值單位","desc":"專業評語"}], 
                  "advice": {"target":"適合的人群","warning":"禁忌或注意事項","action":"具體的食用建議"} 
                }`;

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey.trim()}`;
                    
                    const payload = {
                        contents: [{
                            parts: [
                                { text: systemPrompt },
                                ...images.map(img => {
                                    const match = img.match(/^data:(image\/\w+);base64,/);
                                    const mimeType = match ? match[1] : "image/jpeg";
                                    return {
                                        inlineData: { 
                                            mimeType: mimeType, 
                                            data: img.split(',')[1] 
                                        }
                                    };
                                })
                            ]
                        }]
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "分析連線失敗");

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("API 未回傳有效內容");

                    const cleanJson = rawText.replace(/```json|```/g, '').replace(/^[^{]*/, '').replace(/[^}]*$/, '').trim();
                    const parsedData = JSON.parse(cleanJson);
                    
                    const normalized = {
                        productName: parsedData.productName || parsedData.ProductName || "未知產品",
                        verdict: {
                            title: parsedData.verdict?.title || parsedData.Verdict?.Title || "分析完成",
                            color: parsedData.verdict?.color || parsedData.Verdict?.Color || "yellow"
                        },
                        highlights: parsedData.highlights || parsedData.Highlights || [],
                        advice: {
                            target: parsedData.advice?.target || parsedData.Advice?.Target || "一般大眾",
                            warning: parsedData.advice?.warning || parsedData.Advice?.Warning || "目前無特殊禁忌",
                            action: parsedData.advice?.action || parsedData.Advice?.Action || "建議適量食用，保持飲食均衡"
                        }
                    };
                    setResult(normalized);
                } catch (err) {
                    setError(`解析失敗：${err.message}。請確認圖片清晰並重試。`);
                } finally {
                    // 這裡原本漏掉了 finally 關鍵字，現在已補上修正
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-xl mx-auto">
                        <header className="text-center mb-12">
                            <div className="flex justify-center items-center gap-3 mb-3">
                                <Icon name="Zap" size={36} className="text-amber-500 fill-amber-500" />
                                <h1 className="text-4xl font-black tracking-tighter italic">NUTRITION ELF</h1>
                            </div>
                            <p className="text-neutral-400 text-xs font-bold tracking-[0.4em] uppercase">專業營養數據解析</p>
                        </header>

                        {!result ? (
                            <div className="bg-white rounded-[3rem] p-8 shadow-xl border border-neutral-100 space-y-8 animate-in">
                                <div className="space-y-4">
                                    <div className="group">
                                        <label className="text-[10px] font-black text-neutral-300 uppercase tracking-widest ml-2 group-focus-within:text-amber-500 transition-colors">
                                            API Access (自動記憶)
                                        </label>
                                        <input 
                                            type="password" 
                                            placeholder="輸入您的 API Key"
                                            className="w-full p-6 bg-neutral-50 rounded-[2rem] outline-none focus:ring-2 focus:ring-neutral-200 transition-all text-sm border border-neutral-100 mt-1"
                                            value={apiKey} 
                                            onChange={(e) => handleApiKeyChange(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {images.map((img, i) => (
                                        <div key={i} className="relative aspect-square animate-in">
                                            <img src={img} className="w-full h-full object-cover rounded-[2rem] border border-neutral-100 shadow-sm" />
                                            <button 
                                                onClick={() => setImages(prev => prev.filter((_, idx) =>
